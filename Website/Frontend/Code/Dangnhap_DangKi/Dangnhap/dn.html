<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập || THCS Cự Khê</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/notify.css">
    <link rel="stylesheet" href="/Frontend/Code/Dangnhap_DangKi/Dangnhap/dn.css"> </head>
<body>
    <div id="toast-container-top"></div>

    <div class="container">
        <div class="card">
            <h2>ĐĂNG NHẬP</h2>
            <form id="dnForm">
                <div class="control">
                    <label>Tên đăng nhập:</label>
                    <input type="text" id="dnUser" required>
                </div>
                <div class="control">
                    <label>Mật khẩu:</label>
                    <input type="password" id="dnPass" required>
                </div>
                <div class="control">
                    <label>Mã PIN:</label>
                    <input type="password" id="dnPin" maxlength="6" required>
                </div>

                <label class="remember-me-container">
                    <input type="checkbox" id="chkRemember">
                    <span>Nhớ tôi (Duy trì đăng nhập)</span>
                </label>

                <button type="submit" class="btn-submit">ĐĂNG NHẬP</button>
            </form>
            <p style="text-align:center; margin-top:15px; font-size:0.85rem;">
                Chưa có tài khoản? <a href="/Frontend/Code/Dangnhap_DangKi/Dangki/dk.html">Đăng ký ngay</a>
            </p>
        </div>
    </div>

    <script type="module" src="/Frontend/Code/Dangnhap_DangKi/Dangnhap/dn.js"></script>
</body>
</html>

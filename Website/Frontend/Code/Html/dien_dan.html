<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diễn Đàn || THCS Cự Khê</title>
    <link rel="stylesheet" href="../../../style.css">
    <style>
        .forum-container { max-width: 800px; margin: 20px auto; }
        .create-post { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .create-post textarea { width: 100%; height: 70px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; resize: none; outline: none; }
        .post-card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .post-avt { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .post-actions { display: flex; gap: 20px; margin: 10px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 8px 0; }
        .btn-act { background: none; border: none; cursor: pointer; font-weight: bold; color: #666; }
        .btn-act:hover { color: #0056b3; }
        .cmt-box { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-top: 5px; font-size: 0.9rem; }
        .cmt-input-group { display: flex; gap: 8px; margin-top: 8px; }
        .cmt-input-group input { flex: 1; padding: 6px; border: 1px solid #ddd; border-radius: 4px; }
        .cmt-input-group button { background: #0056b3; color: white; border: none; padding: 0 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <span class="school-name">Diễn Đàn THCS Cự Khê</span>
            <nav class="nav-links">
                <a href="../../../../index.html">Trang chủ</a>
                <a href="dien_dan.html" class="active">Diễn đàn</a>
                <a href="ket_noi.html">Kết Nối</a>
            </nav>
        </div>
    </header>

    <main class="main-content forum-container">
        <div class="create-post">
            <h3 style="margin-bottom: 10px;">Đăng bài viết mới</h3>
            <textarea id="postContent" placeholder="Bạn đang nghĩ gì...?"></textarea>
            <button id="btnPost" style="margin-top:8px; padding:6px 16px; background:#0056b3; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">Đăng bài</button>
        </div>

        <div id="forumFeed"></div>
    </main>

    <script type="module" src="../../Dien_Dan/diendan.js"></script>
</body>
</html>
